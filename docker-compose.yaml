services:
  relay:
    build: ./relay
    restart: unless-stopped
    ports:
      - "8080:8080"
    command: ["npx", "tsx", "index.ts"]

  cli:
    build: ./relay
    profiles: [cli]
    entrypoint: ["npx", "tsx", "cli.ts"]
    environment:
      - RELAY_URL=ws://relay:8080/dev
    stdin_open: true
    tty: true
    depends_on:
      - relay
